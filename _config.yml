 
# Prevent Liquid from processing code blocks
liquid:
  error_mode: warn
  strict_filters: false
  strict_variables: false

# Use GitHub Flavored Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  parse_block_html: true

# Exclude files from processing
exclude:
  - node_modules/
  - vendor/
  - .git/
  - .vscode/
