# Jekyll Configuration for GitHub Pages
# This config fixes build errors caused by Liquid template syntax in code examples

# Site settings
title: Notes & Documentation
description: Technical notes and documentation repository
baseurl: "" # Leave empty for user/organization pages
url: "https://langisor.github.io"

# Theme
theme: jekyll-theme-primer

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
  parse_block_html: true
  hard_wrap: false

# Liquid settings - CRITICAL for fixing React/TypeScript code rendering
liquid:
  error_mode: warn          # Don't fail on Liquid errors, just warn
  strict_filters: false     # Allow undefined filters
  strict_variables: false   # Allow undefined variables

# Plugins (GitHub Pages automatically enables these)
plugins:
  - jekyll-github-metadata
  - jekyll-seo-tag
  - jekyll-coffeescript
  - jekyll-commonmark-ghpages
  - jekyll-gist
  - jekyll-paginate
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Exclude files from processing
exclude:
  - node_modules/
  - vendor/
  - .git/
  - .gitignore
  - .vscode/
  - .foam/
  - .mdnotes/
  - git-ac.sh
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json

# Include files that start with underscore
include:
  - _layouts

# Collections (if needed for organizing docs)
collections_dir: docs

# Timezone
timezone: Asia/Riyadh

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Performance
incremental: false
profile: false

# URL structure
permalink: pretty
